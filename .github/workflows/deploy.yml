name: Deploy CayQR to EC2

on:
  push:
    branches: [ main ] # Sẽ tự chạy mỗi khi bạn push code vào branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cayqr
            git pull origin main
            # Lệnh này sẽ build lại những phần code mới và restart container
            docker-compose up -d --build
            # Dọn dẹp các image cũ không dùng đến để tiết kiệm ổ cứng
            docker image prune -f