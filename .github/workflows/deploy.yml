name: Deploy CayQR to EC2

on:
  push:
    branches: [ main ] # Sẽ tự chạy mỗi khi bạn push code vào branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cayqr
            git pull origin main
            # Build bản mới trước (vẫn để bản cũ chạy để tránh 502)
            docker-compose build --no-cache
            # Sau khi build xong mới khởi động lại container
            docker-compose up -d --force-recreate
            # Khởi động lại Nginx để chắc chắn kết nối mới được nhận
            sudo systemctl restart nginx
            # Dọn dẹp image cũ
            docker image prune -f