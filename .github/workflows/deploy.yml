name: Deploy CayQR to EC2

on:
  push:
    branches: [ main ] # Sẽ tự chạy mỗi khi bạn push code vào branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cayqr
            git pull origin main
            # Dừng và xóa container cũ để đảm bảo không bị kẹt
            docker-compose down
            # Ép Docker build lại từ đầu, không dùng cache để tránh lỗi cũ
            docker-compose up -d --build --force-recreate
            # Dọn dẹp tài nguyên thừa
            docker image prune -f